spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

# JWT properties for tests
jwt:
  secret: default-test-secret-which-is-not-secure-but-ok-for-tests-please-change
  expiration: 86400000
