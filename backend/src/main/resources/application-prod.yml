spring:
  application:
    name: Url_Shortener

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3        # Supabase free tier has limited direct connections
      minimum-idle: 1
      idle-timeout: 600000        # release idle connections after 10 min
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:true}
      timeout: 2000ms

  task:
    execution:
      pool:
        core-size: 2
        max-size: 4
        queue-capacity: 50

cache:
  url:
    ttl: 86400

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

app:
  base-url: ${APP_BASE_URL}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

rate-limit:
  url-creation:
    max-requests: ${RATE_LIMIT_URL_CREATION_MAX_REQUESTS:10}
    window-seconds: ${RATE_LIMIT_URL_CREATION_WINDOW_SECONDS:3600}
  redirect:
    max-requests: ${RATE_LIMIT_REDIRECT_MAX_REQUESTS:100}
    window-seconds: ${RATE_LIMIT_REDIRECT_WINDOW_SECONDS:60}
  api:
    max-requests: ${RATE_LIMIT_API_MAX_REQUESTS:1000}
    window-seconds: ${RATE_LIMIT_API_WINDOW_SECONDS:3600}

server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 20
      min-spare: 4

logging:
  level:
    root: WARN
    com.example.url_shortener: WARN  # suppress Cache HIT/MISS INFO spam on every redirect
    org.springframework: WARN
    org.hibernate: WARN
    org.flywaydb: WARN