spring:
  application:
    name: Url_Shortener

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format-sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true # IMPORTANT (prevent accidental DB wipe)

  # Redis Configuration
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

# Cache Settings
cache:
  url:
    ttl: 86400 # 24 hours in seconds

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

app:
  base-url: ${APP_BASE_URL:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

# Rate Limiting Configuration
rate-limit:
  url-creation:
    max-requests: 10 # Maximum URLs a user can create
    window-seconds: 3600 # Per hour
  redirect:
    max-requests: 100 # Maximum redirects per IP
    window-seconds: 60 # Per minute
  api:
    max-requests: 1000 # Maximum API calls per user
    window-seconds: 3600 # Per hour
